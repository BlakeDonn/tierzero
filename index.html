<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier Zero — TBC Pre-Raid Gear Planner</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2345b35a'/%3E%3Cstop offset='1' stop-color='%231a6b30'/%3E%3C/linearGradient%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%230f1f14'/%3E%3Cstop offset='1' stop-color='%230a0f0c'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23bg)' stroke='url(%23g)' stroke-width='2.5'/%3E%3Ctext x='32' y='30' text-anchor='middle' font-family='serif' font-weight='900' font-size='22' fill='url(%23g)' letter-spacing='-1'%3EMW%3C/text%3E%3Cline x1='14' y1='42' x2='50' y2='42' stroke='url(%23g)' stroke-width='1.5' stroke-linecap='round'/%3E%3Ctext x='32' y='52' text-anchor='middle' font-family='sans-serif' font-size='8' fill='%23367a45' letter-spacing='2'%3ETIER 0%3C/text%3E%3C/svg%3E">

  <!-- Wowhead Tooltips -->

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0a0a1a;
      --bg-panel: #12122a;
      --bg-slot: #1a1a3a;
      --bg-slot-hover: #222244;
      --border-gold: #c8aa6e;
      --border-dim: #2a2a3e;
      --text-gold: #f0e6d2;
      --text-dim: #a09b8c;
      --epic: #a335ee;
      --rare: #0070dd;
      --uncommon: #1eff00;
      --legendary: #ff8000;
      --mage-color: #69ccf0;
      --paladin-color: #f58cba;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Roboto',sans-serif; background:var(--bg-dark); color:var(--text-gold); min-height:100vh; line-height:1.5; }

    /* Header */
    .header { padding:8px 16px; border-bottom:2px solid var(--border-gold); background:linear-gradient(180deg,rgba(200,170,110,0.08) 0%,transparent 100%); }
    .header-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; max-width:1200px; margin:0 auto; }
    .header h1 { font-family:'Cinzel',serif; font-size:1.3rem; color:var(--border-gold); text-shadow:0 0 20px rgba(200,170,110,0.3); letter-spacing:1px; text-align:center; position:relative; }
    .header-sig { font-family:'Roboto',sans-serif; font-size:0.55rem; font-weight:400; color:var(--text-dim); letter-spacing:0.5px; font-style:italic; position:absolute; bottom:-2px; white-space:nowrap; margin-left:4px; }
    .header .header-spec { display:inline-flex; align-items:center; gap:10px; font-size:0.85rem; justify-self:end; }
    .header .header-spec .spec-name { font-family:'Cinzel',serif; font-weight:600; }
    .header .header-spec .change-spec-btn { font-size:0.7rem; color:var(--text-dim); background:none; border:1px solid var(--border-dim); border-radius:12px; padding:2px 10px; cursor:pointer; transition:all 0.2s; }
    .header .header-spec .change-spec-btn:hover { color:var(--text-gold); border-color:var(--border-gold); }

    /* Spec Tabs (hidden when spec chosen) */
    .nav-bar { display:flex; justify-content:center; gap:2px; padding:8px 16px; background:var(--bg-panel); border-bottom:1px solid var(--border-dim); flex-wrap:wrap; }
    .nav-bar.hidden { display:none; }
    .spec-tab { font-size:0.82rem; font-weight:500; padding:8px 16px; background:transparent; color:var(--text-dim); border:none; border-bottom:3px solid transparent; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .spec-tab:hover { color:var(--text-gold); background:rgba(200,170,110,0.05); }
    .spec-tab.active { color:var(--text-gold); border-bottom-color:var(--border-gold); }
    .spec-tab.active[data-class="mage"] { border-bottom-color:var(--mage-color); color:var(--mage-color); }
    .spec-tab.active[data-class="paladin"] { border-bottom-color:var(--paladin-color); color:var(--paladin-color); }

    /* Spec Picker (initial screen) */
    .spec-picker-overlay { position:fixed; inset:0; z-index:500; background:var(--bg-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
    .spec-picker-overlay h2 { font-family:'Cinzel',serif; font-size:2rem; color:var(--border-gold); text-shadow:0 0 20px rgba(200,170,110,0.3); margin:0; }
    .landing-title { text-align:center; }
    .landing-presents { font-family:'Roboto',sans-serif; font-size:0.65rem; text-transform:uppercase; letter-spacing:3px; color:var(--text-dim); display:block; margin-bottom:4px; }
    .landing-sub { font-family:'Roboto',sans-serif; font-size:0.7rem; letter-spacing:1px; color:var(--text-dim); display:block; margin-top:2px; }
    .spec-picker-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:12px; max-width:700px; width:100%; padding:0 20px; }
    .spec-pick-card { background:var(--bg-panel); border:2px solid var(--border-dim); border-radius:10px; padding:20px 16px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .spec-pick-card:hover { border-color:var(--border-gold); background:var(--bg-slot-hover); transform:translateY(-2px); }
    .spec-pick-card .pick-icon { font-size:2rem; margin-bottom:6px; }
    .spec-pick-card .pick-name { font-family:'Cinzel',serif; font-size:1rem; color:var(--text-gold); }
    .spec-pick-card .pick-class { font-size:0.75rem; color:var(--text-dim); margin-top:2px; }
    .spec-pick-card[data-class="mage"]:hover { border-color:var(--mage-color); }
    .spec-pick-card[data-class="paladin"]:hover { border-color:var(--paladin-color); }


    /* View Tabs */
    .view-tabs { display:flex; gap:0; }
    .view-btn { font-size:0.8rem; font-weight:500; padding:6px 16px; background:transparent; color:var(--text-dim); border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.2s; }
    .view-btn:hover { color:var(--text-gold); }
    .view-btn.active { color:var(--text-gold); border-bottom-color:var(--border-gold); }

    /* Views */
    .view { display:none; padding:20px 16px; max-width:1200px; margin:0 auto; }
    .view.active { display:block; }

    /* ===== CHARACTER SHEET ===== */
    .paperdoll-container { display:grid; grid-template-columns:1fr minmax(300px,500px) 1fr; gap:4px 14px; align-items:start; }
    .slot-column .slot-header { padding:5px 8px; gap:6px; }
    .slot-column .slot-label { font-size:0.6rem; }
    .slot-column .slot-bis .item-link { font-size:0.78rem; }
    .slot-column .slot-bis .item-src { font-size:0.64rem; }
    .slot-column .slot-expand { font-size:0.65rem; }
    .slot-column { display:flex; flex-direction:column; gap:3px; }
    .center-column { display:flex; flex-direction:column; gap:6px; align-items:center; min-width:0; }
    .weapon-mid { display:flex; justify-content:center; gap:8px; width:100%; margin-top:16px; }
    .weapon-mid .gear-slot, .weapon-bottom .gear-slot { flex:1; min-width:0; transition:flex 0.25s ease; }
    .weapon-mid .gear-slot.open, .weapon-bottom .gear-slot.open { flex:3; }
    .weapon-mid .slot-header, .weapon-bottom .slot-header { padding:6px 8px; gap:6px; flex-direction:column; align-items:center; text-align:center; }
    .weapon-mid .slot-bis, .weapon-bottom .slot-bis { text-align:center; width:100%; min-width:0; }
    .weapon-mid .slot-bis .item-link, .weapon-bottom .slot-bis .item-link { font-size:0.75rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .weapon-mid .slot-label, .weapon-bottom .slot-label { font-size:0.58rem; white-space:nowrap; }
    .weapon-mid .slot-bis .item-src, .weapon-bottom .slot-bis .item-src { font-size:0.62rem; }
    .weapon-mid .slot-expand, .weapon-bottom .slot-expand { font-size:0.6rem; }
    .weapon-bottom { display:flex; justify-content:center; gap:8px; margin-top:6px; }
    .weapon-bottom .gear-slot { max-width:220px; }

    /* Gear slot card */
    .gear-slot { background:var(--bg-slot); border:1px solid var(--border-dim); border-radius:6px; border-left:3px solid var(--border-dim); transition:all 0.15s; cursor:pointer; overflow:hidden; }
    .gear-slot:hover { border-color:rgba(200,170,110,0.4); background:var(--bg-slot-hover); }
    .gear-slot.quality-epic { border-left-color:var(--epic); }
    .gear-slot.quality-rare { border-left-color:var(--rare); }
    .gear-slot.quality-uncommon { border-left-color:var(--uncommon); }
    .gear-slot.quality-legendary { border-left-color:var(--legendary); }

    .slot-header { display:flex; align-items:center; gap:10px; padding:8px 10px; }
    .slot-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); }
    .slot-bis { flex:1; min-width:0; }
    .slot-bis .item-link { font-size:0.82rem; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .slot-bis .item-src { font-size:0.68rem; color:var(--text-dim); margin-top:1px; }
    .slot-expand { font-size:0.7rem; color:var(--text-dim); flex-shrink:0; transition:transform 0.2s; }
    .gear-slot.open .slot-expand { transform:rotate(180deg); }

    /* Alternatives dropdown */
    .slot-alts { display:none; border-top:1px solid var(--border-dim); background:rgba(0,0,0,0.2); }
    .gear-slot.open .slot-alts { display:block; }
    .alt-item { display:flex; align-items:center; gap:8px; padding:6px 10px 6px 16px; border-bottom:1px solid rgba(42,42,62,0.5); font-size:0.8rem; transition:background 0.1s; }
    .alt-item:last-child { border-bottom:none; }
    .alt-item:hover { background:rgba(200,170,110,0.04); }
    .alt-rank { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:700; flex-shrink:0; border:1px solid #444; background:rgba(255,255,255,0.04); color:var(--text-dim); }
    .alt-rank.r1 { background:rgba(200,170,110,0.25); color:var(--border-gold); border-color:var(--border-gold); }
    .alt-rank.r2 { background:rgba(192,192,192,0.12); color:#bbb; border-color:#777; }
    .alt-rank.r3 { background:rgba(180,115,50,0.12); color:#b87333; border-color:#906030; }
    .alt-info { flex:1; min-width:0; }
    .alt-info .alt-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .alt-info .alt-src { font-size:0.68rem; color:var(--text-dim); }

    /* Center panel */
    .character-model { background:var(--bg-panel); border:1px solid var(--border-dim); border-radius:8px; padding:12px; text-align:center; min-width:0; }
    .character-model.compact { padding:8px; }
    .stats-row { display:flex; gap:8px; width:100%; align-items:stretch; }
    .stats-row > * { flex:1; min-width:0; }
    .character-model.compact .spec-notes { margin-bottom:6px; font-size:0.72rem; line-height:1.4; }
    .character-model.compact .stat-summary { gap:5px; }
    .character-model.compact .stat-row .stat-label { font-size:0.7rem; }
    .character-model.compact .stat-bar { height:4px; }
    .spec-title { font-family:'Cinzel',serif; font-size:1rem; font-weight:600; margin-bottom:12px; }
    .spec-notes { font-size:0.78rem; color:var(--text-dim); text-align:left; margin-bottom:12px; line-height:1.6; }
    .stat-summary { display:flex; flex-direction:column; gap:8px; }
    .stat-row { display:flex; flex-direction:column; gap:2px; }
    .stat-row .stat-label { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-dim); }
    .stat-row .stat-value { color:var(--text-gold); font-weight:500; }
    .stat-bar { width:100%; height:5px; background:var(--bg-dark); border-radius:3px; overflow:hidden; }
    .stat-bar .stat-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--border-gold),#e8d5a3); transition:width 0.4s; }
    .stat-bar .stat-fill.cap-hit { background:linear-gradient(90deg,#4a9,#6d6); }
    .stat-bar .stat-fill.cap-full { background:linear-gradient(90deg,#4a9,#2f2); }

    /* ===== GEARING ROUTES ===== */
    .routes-container { display:flex; flex-direction:column; gap:20px; }
    .routes-two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:start; }
    .routes-section-title { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--border-gold); border-bottom:1px solid var(--border-dim); padding-bottom:6px; margin-bottom:10px; }
    .priority-list { list-style:none; counter-reset:priority; display:flex; flex-direction:column; gap:6px; }
    .priority-list li { counter-increment:priority; display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--bg-slot); border:1px solid var(--border-dim); border-radius:6px; font-size:0.88rem; }
    .priority-list li::before { content:counter(priority); display:flex; align-items:center; justify-content:center; width:26px; height:26px; background:var(--bg-dark); border:1px solid var(--border-gold); border-radius:50%; font-family:'Cinzel',serif; font-size:0.75rem; font-weight:700; color:var(--border-gold); flex-shrink:0; }
    .routes-search { width:100%; padding:7px 12px; background:var(--bg-dark); color:var(--text-gold); border:1px solid var(--border-dim); border-radius:6px; font-family:'Roboto',sans-serif; font-size:0.82rem; outline:none; margin-bottom:10px; }
    .routes-search:focus { border-color:var(--border-gold); }
    .routes-search::placeholder { color:var(--text-dim); }
    .priority-sidebar { position:sticky; top:12px; }

    /* ===== GEAR TRACKER ===== */
    .tracker-container { display:flex; flex-direction:column; gap:14px; }
    .tracker-progress { background:var(--bg-panel); border:1px solid var(--border-dim); border-radius:8px; padding:18px; text-align:center; }
    .progress-label { font-family:'Cinzel',serif; font-size:1rem; color:var(--border-gold); margin-bottom:8px; }
    .progress-bar { width:100%; height:10px; background:var(--bg-dark); border-radius:5px; overflow:hidden; border:1px solid var(--border-dim); }
    .progress-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,var(--uncommon),#2aff2a); transition:width 0.4s; }
    .progress-text { font-size:0.82rem; color:var(--text-dim); margin-top:6px; }
    .tracker-stats { display:flex; flex-wrap:wrap; gap:6px 14px; justify-content:center; padding:6px 0; font-size:0.8rem; color:var(--text-dim); }
    .tracker-stats strong { color:var(--text-gold); }
    .tracker-slots { display:flex; flex-direction:column; gap:6px; }
    .tracker-slot { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg-slot); border:1px solid var(--border-dim); border-radius:6px; }
    .tracker-slot-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); width:85px; flex-shrink:0; }
    .tracker-slot select { flex:1; padding:5px 8px; background:var(--bg-dark); color:var(--text-gold); border:1px solid var(--border-dim); border-radius:4px; font-family:'Roboto',sans-serif; font-size:0.82rem; cursor:pointer; outline:none; }
    .tracker-slot select:focus { border-color:var(--border-gold); }
    .owned-badge, .needed-badge { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:10px; flex-shrink:0; }
    .owned-badge { background:rgba(30,255,0,0.12); color:var(--uncommon); border:1px solid rgba(30,255,0,0.25); }
    .needed-badge { background:rgba(255,60,60,0.1); color:#ff5555; border:1px solid rgba(255,60,60,0.2); }
    .tracker-actions { display:flex; justify-content:center; padding:12px 0; }
    .tracker-actions button { font-size:0.82rem; padding:8px 20px; border-radius:6px; cursor:pointer; transition:all 0.2s; border:1px solid var(--border-dim); background:var(--bg-panel); color:var(--text-gold); }
    .tracker-actions button:hover { border-color:var(--border-gold); }
    .reset-btn { color:#ff5555!important; border-color:rgba(255,60,60,0.25)!important; }
    .reset-btn:hover { background:rgba(255,60,60,0.08)!important; border-color:#ff5555!important; }

    /* Addon banner */
    .addon-banner { text-align:center; font-size:0.8rem; color:var(--text-dim); padding:10px 16px; margin-bottom:14px; background:rgba(200,170,110,0.06); border:1px solid var(--border-dim); border-radius:8px; line-height:1.7; }
    .addon-dl-link { color:var(--text-gold); font-weight:600; margin-left:6px; text-decoration:underline; cursor:pointer; }
    .addon-dl-link:hover { color:#fff; }
    .addon-hint { display:block; font-size:0.7rem; color:var(--text-dim); margin-top:2px; }

    /* Wowhead links - let their script handle colors/icons */
    a[href*="wowhead.com"] { text-decoration:none; }
    .wowhead-tooltip { transform:scale(0.75); transform-origin:top left; }

    /* Source tags */
    .tag { display:inline-block; font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; padding:1px 6px; border-radius:3px; margin-left:4px; vertical-align:middle; }
    .tag-heroic { background:rgba(163,53,238,0.15); color:#b366e0; }
    .tag-dungeon { background:rgba(0,112,221,0.15); color:#5eaadd; }
    .tag-craft { background:rgba(255,128,0,0.15); color:#ffaa44; }
    .tag-rep { background:rgba(30,255,0,0.12); color:#44cc44; }
    .tag-pvp { background:rgba(255,60,60,0.15); color:#dd5555; }
    .tag-badge { background:rgba(200,170,110,0.15); color:var(--border-gold); }
    .tag-quest { background:rgba(255,255,0,0.1); color:#cccc44; }
    .tag-world { background:rgba(163,53,238,0.1); color:#9966cc; }
    .tag-classic { background:rgba(139,90,43,0.15); color:#c4a46c; }

    /* ===== GEARING ROUTES — Visual Overhaul ===== */
    .source-list-detail { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
    .source-list-col { display:flex; flex-direction:column; gap:2px; }

    /* Category headers */
    .source-category { margin-bottom:2px; }
    .source-cat-header { display:flex; align-items:center; gap:8px; padding:6px 10px; cursor:pointer; user-select:none; border-radius:6px; transition:background 0.12s; }
    .source-cat-header:hover { background:rgba(200,170,110,0.05); }
    .source-cat-header .cat-icon { font-size:0.9rem; }
    .source-cat-header .cat-label { font-family:'Cinzel',serif; font-size:0.8rem; color:var(--text-gold); flex:1; }
    .source-cat-header .cat-count { font-size:0.6rem; color:var(--text-dim); }
    .source-cat-header .cat-count strong { color:var(--uncommon); }
    .source-cat-header .cat-arrow { font-size:0.55rem; color:var(--text-dim); transition:transform 0.15s; }
    .source-category.cat-open .cat-arrow { transform:rotate(180deg); }
    .source-cat-children { display:none; padding-left:12px; }
    .source-category.cat-open .source-cat-children { display:flex; flex-direction:column; gap:2px; }

    /* Color bar on category header */
    .source-cat-header .cat-bar { width:40px; height:3px; border-radius:2px; flex-shrink:0; overflow:hidden; background:rgba(255,255,255,0.06); }
    .source-cat-header .cat-bar-fill { height:100%; border-radius:2px; }

    /* Individual source rows */
    .source-row { display:flex; align-items:center; gap:6px; padding:5px 8px; background:var(--bg-slot); border:1px solid transparent; border-radius:4px; cursor:pointer; transition:all 0.12s; position:relative; overflow:hidden; font-size:0.75rem; }
    .source-row:hover { border-color:rgba(200,170,110,0.3); background:var(--bg-slot-hover); }
    .source-row.source-active { border-color:var(--border-gold); background:var(--bg-slot-hover); }
    .source-row.source-complete { opacity:0.4; }
    .source-row .source-name { flex:1; color:var(--text-gold); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .source-row.source-complete .source-name { text-decoration:line-through; }
    .source-row .source-count { font-size:0.6rem; color:var(--text-dim); flex-shrink:0; }
    .source-row .source-count strong { color:var(--uncommon); }

    /* Category type colors */
    .source-category.cat-heroic .cat-bar-fill { background:#8844cc; }
    .source-category.cat-badge .cat-bar-fill { background:var(--border-gold); }
    .source-category.cat-craft .cat-bar-fill { background:#cc7722; }
    .source-category.cat-rep .cat-bar-fill { background:#33aa33; }
    .source-category.cat-classic .cat-bar-fill { background:#8b6633; }
    .source-category.cat-dungeon .cat-bar-fill { background:#2266bb; }
    .source-category.cat-quest .cat-bar-fill { background:#aaaa33; }
    .source-category.cat-pvp .cat-bar-fill { background:#cc3333; }
    .source-category.cat-world .cat-bar-fill { background:#7744aa; }
    .source-category.cat-_other .cat-bar-fill { background:#8899aa; }

    /* Detail panel (right side, sticky) */
    .detail-panel { position:sticky; top:12px; background:var(--bg-panel); border:1px solid var(--border-dim); border-radius:8px; overflow:hidden; min-height:120px; }
    .detail-panel-header { padding:12px 14px; border-bottom:1px solid var(--border-dim); }

let currentSpec = localStorage.getItem("prebis-spec") || "";
let currentView = "sheet"; // "sheet" | "routes" | "tracker"
let sheetMode = "bis"; // "bis" | "mygear"

// ---------------------------------------------------------------------------
// Profession Filters
// ---------------------------------------------------------------------------
const ALL_PROFESSIONS = ["Tailoring","Blacksmithing","Leatherworking","Jewelcrafting","Alchemy","Engineering"];

function loadProfessions() {
  try {
    var raw = localStorage.getItem("prebis-professions");
    return raw ? JSON.parse(raw) : ALL_PROFESSIONS.slice(); // all enabled by default
  } catch(e) { return ALL_PROFESSIONS.slice(); }
}

function saveProfessions(profs) {
  localStorage.setItem("prebis-professions", JSON.stringify(profs));
}

function toggleProfession(prof) {
  var profs = loadProfessions();
  var idx = profs.indexOf(prof);
  if (idx === -1) profs.push(prof);
  else profs.splice(idx, 1);
  saveProfessions(profs);
  renderCurrentView();
}

function isItemFilteredByProfession(item) {
  var profs = loadProfessions();
  var s = item.src.toLowerCase();
  for (var i = 0; i < ALL_PROFESSIONS.length; i++) {
    var p = ALL_PROFESSIONS[i].toLowerCase();
    if (s.includes(p) && profs.indexOf(ALL_PROFESSIONS[i]) === -1) return true;
  }
  return false;
}

function isItemOwnedInTracker(slotKey, itemId) {
  var tracked = loadTracker();
  var spec = specData();
  if (tracked[slotKey] === undefined || tracked[slotKey] === "") return false;
  var val = String(tracked[slotKey]);
  if (val.indexOf("c:") === 0) return false; // custom items don't match BiS items
  var idx = parseInt(val, 10);
  var items = spec.slots[slotKey];
  if (!items || !items[idx]) return false;
  return items[idx].id === itemId;
}

// Parse a custom tracker value "c:ITEMID:NAME" → {id, name} or null
function parseCustomItem(val) {
  if (!val || String(val).indexOf("c:") !== 0) return null;
  var rest = String(val).substring(2);
  var colonIdx = rest.indexOf(":");
  if (colonIdx === -1) return {id: 0, name: rest};
  var id = parseInt(rest.substring(0, colonIdx), 10) || 0;
  var name = rest.substring(colonIdx + 1);
  return {id: id, name: name};
}

var _customStatsCache = {};
(function() {
  try { _customStatsCache = JSON.parse(localStorage.getItem("prebis-custom-stats") || "{}"); } catch(e) { _customStatsCache = {}; }
})();

}
function getCustomItemStats(itemId) {
  return _customStatsCache[itemId] || null;
}

// Wowhead stat/rtg ID → our stat key
var WH_STAT_MAP = {
  3:'agi', 4:'str', 5:'int', 6:'spi', 7:'stam'
};
var WH_RTG_MAP = {
  12:'def', 13:'dodge', 14:'parry', 15:'block', 21:'crit', 31:'hit', 32:'crit', 35:'res', 37:'exp'
};

function parseWowheadStats(tooltipHtml) {
  var stats = {};
  // Base stats: <!--stat5-->+17
  var statRe = /<!--stat(\d+)-->\+?(\d+)/g;
  var m;
  while ((m = statRe.exec(tooltipHtml)) !== null) {
    var key = WH_STAT_MAP[m[1]];
    if (key) stats[key] = (stats[key] || 0) + parseInt(m[2]);
  }
  // Rating stats: <!--rtg21-->28
  var rtgRe = /<!--rtg(\d+)-->(\d+)/g;
  while ((m = rtgRe.exec(tooltipHtml)) !== null) {
    var key = WH_RTG_MAP[m[1]];
    if (key) stats[key] = (stats[key] || 0) + parseInt(m[2]);
  }
  // Spell power: "damage and healing done by magical spells and effects by up to X"
  var spMatch = tooltipHtml.match(/damage and healing[^<]*?by up to (\d+)/i);
  if (spMatch) stats.sp = (stats.sp || 0) + parseInt(spMatch[1]);
  // Fire/Arcane/Shadow specific spell power (count as sp)
  var schoolSp = tooltipHtml.match(/damage done by \w+[^<]*?by up to (\d+)/gi);
  if (schoolSp && !spMatch) {
    stats.sp = (stats.sp || 0) + parseInt(schoolSp[0].match(/(\d+)/)[1]);
  }
  // Healing power: "healing done by spells and effects by up to X"
  var healMatch = tooltipHtml.match(/healing done by spells[^<]*?by up to (\d+)/i);
  if (healMatch) stats.hp = (stats.hp || 0) + parseInt(healMatch[1]);
  // MP5: "Restores X mana per 5 sec"
  var mp5Match = tooltipHtml.match(/Restores (\d+) mana per 5 sec/i);
  if (mp5Match) stats.mp5 = (stats.mp5 || 0) + parseInt(mp5Match[1]);
  return Object.keys(stats).length > 0 ? stats : null;
}

function fetchCustomItemStats(itemId, callback) {
  if (!itemId) { if (callback) callback(null); return; }
  if (_customStatsCache[itemId]) { if (callback) callback(_customStatsCache[itemId]); return; }
  fetch('https://nether.wowhead.com/tooltip/item/' + itemId + '?dataEnv=5&locale=0')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var stats = parseWowheadStats(data.tooltip || '');
      if (stats) {
        _customStatsCache[itemId] = stats;
        saveCustomStatsCache();
      }
      if (callback) callback(stats);
    })
    .catch(function() { if (callback) callback(null); });
}

// Get display info for a tracked slot — returns {name, id, src, q, stats, isCustom} or null
function getTrackedItem(slotKey) {
  var tracked = loadTracker();
  var spec = specData();
  var val = tracked[slotKey];
  if (val === undefined || val === "") return null;
  var str = String(val);
  if (str.indexOf("c:") === 0) {
    var custom = parseCustomItem(str);
    return custom ? {name: custom.name, id: custom.id, src: "Custom", q: Q.rare, stats: getCustomItemStats(custom.id), isCustom: true} : null;
  }
  var idx = parseInt(str, 10);
  var items = spec.slots[slotKey];
  if (!items || !items[idx]) return null;
  var item = items[idx];
  return {name: item.name, id: item.id, src: item.src, q: item.q, stats: item.stats, isCustom: false};
}

// ---------------------------------------------------------------------------
function sourceTag(src) {
  const s = src.toLowerCase();
  if (s.includes("heroic"))                                                           return '<span class="tag tag-heroic">Heroic</span>';
  if (s.includes("badge") || s.includes("g'eras"))                                    return '<span class="tag tag-badge">Badges</span>';
  if (s.includes("honor") || s.includes("pvp") || s.includes("arena") || s.includes("gladiator")) return '<span class="tag tag-pvp">PvP</span>';
  if (s.includes("tailoring") || s.includes("blacksmithing") || s.includes("leatherworking") ||
      s.includes("jewelcrafting") || s.includes("engineering") || s.includes("alchemy") || s.includes("craft")) return '<span class="tag tag-craft">Crafted</span>';
  if (s.includes("quest"))                                                            return '<span class="tag tag-quest">Quest</span>';
  if (s.includes("exalted") || s.includes("revered") || s.includes("honored") || s.includes("faction") || s.includes("reputation")) return '<span class="tag tag-rep">Rep</span>';
  if (s.includes("world drop") || s.includes("boe"))                                 return '<span class="tag tag-world">World</span>';
  if (s.includes("classic") || s.includes("naxx") || s.includes("aq") || s.includes("bwl") || s.includes("molten")) return '<span class="tag tag-classic">Classic</span>';
  return '<span class="tag tag-dungeon">Dungeon</span>';
}

function itemLink(item) {
  return '<a href="https://www.wowhead.com/tbc/item=' + item.id + '" onclick="if(!event.ctrlKey&&!event.metaKey&&event.button===0){event.preventDefault();}">' + item.name + '</a>';
}

function refreshWowheadLinks() {
  setTimeout(function () {
    if (typeof $WowheadPower !== 'undefined') {
      $WowheadPower.refreshLinks();
    }
  }, 100);
}

// ---------------------------------------------------------------------------
// Quality helper — maps Q enum to CSS class suffix
// ---------------------------------------------------------------------------
function qualityClass(q) {
  if (q === Q.legendary) return "legendary";
  if (q === Q.epic)      return "epic";
  if (q === Q.rare)      return "rare";
  if (q === Q.uncommon)  return "uncommon";
  return "rare"; // fallback
}

function buildSpecPicker() {

function pickSpec(spec) {

function toggleSlot(el) {
  var wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  refreshWowheadLinks();
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var rect = el.getBoundingClientRect();
      if (!wasOpen && rect.bottom > window.innerHeight) {
        var overflow = rect.bottom - window.innerHeight;
        var nudge = Math.min(overflow + 20, 150);
        window.scrollTo({ top: window.scrollY + nudge, behavior: 'smooth' });
      } else if (wasOpen && rect.top < 0) {
        var nudge = Math.min(Math.abs(rect.top) + 20, 150);
        window.scrollTo({ top: window.scrollY - nudge, behavior: 'smooth' });
      }
    });
  });
}

function renderGearSlot(slotKey) {
  var items = specSlots()[slotKey];
  if (!items || !items.length) return "";
  var top = items[0];
  var label = SLOT_LABELS[slotKey] || slotKey;
  var qc = qualityClass(top.q);
  var count = items.length;

  var html = '<div class="gear-slot quality-' + qc + '" onclick="toggleSlot(this)">';
  html += '<div class="slot-header">';
  html += '<div class="slot-bis">';

  html += '</div>';
  if (count > 1) html += '<div class="slot-expand">' + count + ' &#9660;</div>';
  html += '</div>';

  if (count > 1) {
    html += '<div class="slot-alts">';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      html += '<div class="alt-item">';
      html += '<div class="alt-rank ' + rc + '">' + (i+1) + '</div>';
      html += '<div class="alt-info">';

      html += '<div class="alt-src">' + it.src + ' ' + sourceTag(it.src) + '</div>';
      html += '</div></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function computeBisStats() {
  var spec = specData();
  var stats = {};
  var slotKeys = Object.keys(spec.slots);
  // Avoid double-counting weapons: prefer mainhand+offhand over twohand
  var hasMainhand = !!spec.slots["mainhand"];
  var hasTwohand = !!spec.slots["twohand"];
  for (var i = 0; i < slotKeys.length; i++) {
    var sk = slotKeys[i];
    if (sk === "twohand" && hasMainhand) continue;
    if ((sk === "mainhand" || sk === "offhand") && hasTwohand && !hasMainhand) continue;
    var item = bisItem(sk);
    if (!item || !item.stats) continue;
    var skeys = Object.keys(item.stats);
    for (var j = 0; j < skeys.length; j++) {
      stats[skeys[j]] = (stats[skeys[j]] || 0) + item.stats[skeys[j]];
    }
  }
  return stats;
}

var STAT_NAMES = {sp:"Spell Power",hit:"Hit Rating",crit:"Crit Rating",int:"Intellect",stam:"Stamina",haste:"Haste",str:"Strength",ap:"Attack Power",agi:"Agility",exp:"Expertise",def:"Defense",dodge:"Dodge",block:"Block Rating",bv:"Block Value",heal:"+Healing",mp5:"MP5",spi:"Spirit",parry:"Parry"};

function renderStatSummary(stats) {
  var spec = specData();
  var html = '<div class="stat-summary">';
  var statKeys = Object.keys(stats).filter(function(k) { return stats[k] > 0; });
  if (!statKeys.length) return '<div class="stat-summary"><div style="font-size:0.8rem;color:var(--text-dim)">No stat data</div></div>';

  // Sort: put hit and defense (cap-based stats) last
  statKeys.sort(function (a, b) {
    if (a === "hit" || a === "def") return 1;
    if (b === "hit" || b === "def") return -1;
    return (stats[b] || 0) - (stats[a] || 0);
  });

  for (var i = 0; i < statKeys.length; i++) {
    var key = statKeys[i];
    var val = stats[key];
    var pct;
    var extra = "";

    if (key === "hit" && spec.hitCap) {
      pct = Math.min(100, Math.round((val / spec.hitCap) * 100));
      extra = " / " + spec.hitCap + " cap";
    } else if (key === "def" && spec.defCap) {
      pct = Math.min(100, Math.round((val / spec.defCap) * 100));
      extra = " / " + spec.defCap + " cap";
    } else {
      // Generic bar: scale relative to the largest stat value
      var maxVal = 0;
      for (var k = 0; k < statKeys.length; k++) {
        if (statKeys[k] !== "hit" && statKeys[k] !== "def") {
          maxVal = Math.max(maxVal, stats[statKeys[k]]);
        }
      }
      pct = maxVal > 0 ? Math.round((val / maxVal) * 100) : 0;
    }

    var niceName = STAT_NAMES[key] || key.charAt(0).toUpperCase() + key.slice(1);
    var fillClass = 'stat-fill';
    if ((key === 'hit' || key === 'def') && pct >= 100) fillClass += ' cap-full';
    else if ((key === 'hit' || key === 'def') && pct >= 70) fillClass += ' cap-hit';
    html += '<div class="stat-row">' +
      '<div class="stat-label"><span>' + niceName + '</span><span class="stat-value">' + val + extra + '</span></div>' +
      '<div class="stat-bar"><div class="' + fillClass + '" style="width:' + pct + '%"></div></div>' +
    '</div>';
  }

  html += '</div>';
  return html;
}

function setSheetMode(mode) {
  sheetMode = mode;
  renderSheet();
}

function renderMyGearSlot(slotKey) {
  var spec = specData();
  var items = spec.slots[slotKey];
  if (!items || !items.length) return "";
  var label = SLOT_LABELS[slotKey] || slotKey;
  var trackedItem = getTrackedItem(slotKey);
  var hasItem = !!trackedItem;
  var qc = hasItem ? qualityClass(trackedItem.q) : "none";

  var html = '<div class="gear-slot mygear-slot quality-' + qc + '" onclick="toggleSlot(this)">';
  html += '<div class="slot-header">';
  html += '<div class="slot-bis">';
  html += '<div class="slot-label">' + label + '</div>';
  if (hasItem) {
    if (trackedItem.id) {
      html += '<div class="item-link">' + itemLink(trackedItem) + '</div>';
    } else {
      html += '<div class="item-link">' + trackedItem.name + '</div>';
    }
    html += '<div class="item-src">' + trackedItem.src + (trackedItem.isCustom ? '' : ' ' + sourceTag(trackedItem.src)) + '</div>';
  } else {
    html += '<div class="mygear-empty"><span class="needed-badge">Empty — Needed</span></div>';
  }
  html += '</div>';

  // For custom items, all BiS items are upgrades. For BiS items, items ranked higher are upgrades.
  var upgradeCount = items.length; // default: all items are upgrades
  if (hasItem && !trackedItem.isCustom) {
    var tracked = loadTracker();
    var curIdx = parseInt(tracked[slotKey], 10);
    upgradeCount = curIdx; // items before current index are upgrades
  }
  if (upgradeCount > 0) html += '<div class="slot-expand">' + upgradeCount + ' &#9660;</div>';
  html += '</div>';

  // Show upgrade options in dropdown
  if (upgradeCount > 0) {
    html += '<div class="slot-alts">';
    var limit = (hasItem && !trackedItem.isCustom) ? parseInt(loadTracker()[slotKey], 10) : items.length;
    for (var i = 0; i < limit; i++) {
      var it = items[i];
      var rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      html += '<div class="alt-item">';
      html += '<div class="alt-rank ' + rc + '">' + (i+1) + '</div>';
      html += '<div class="alt-info">';
      html += '<div class="alt-name">' + itemLink(it) + '</div>';
      html += '<div class="alt-src">' + it.src + ' ' + sourceTag(it.src) + '</div>';
      html += '</div></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderStatComparison(bisStats, myStats) {
  var allKeys = {};
  Object.keys(bisStats).forEach(function(k) { allKeys[k] = true; });
  Object.keys(myStats).forEach(function(k) { allKeys[k] = true; });
  var keys = Object.keys(allKeys).filter(function(k) { return (bisStats[k] || 0) > 0 || (myStats[k] || 0) > 0; });
  keys.sort(function(a, b) { return (bisStats[b] || 0) - (bisStats[a] || 0); });

  var html = '<div>';
  html += '<div style="font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;letter-spacing:0.5px;">BiS vs Your Gear</div>';
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var bv = bisStats[k] || 0;
    var mv = myStats[k] || 0;
    if (bv === 0 && mv === 0) continue;
    var niceName = STAT_NAMES[k] || k.charAt(0).toUpperCase() + k.slice(1);
    html += '<div class="stat-compare">';
    html += '<span>' + niceName + '</span>';
    html += '<span><span class="bis-val">' + bv + '</span> &rarr; <span class="my-val' + (mv < bv ? ' lower' : '') + '">' + mv + '</span></span>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderSheet() {
  var spec = specData();
  var bis = spec.slots;
  var classColor = spec.class.toLowerCase() === "mage" ? "var(--mage-color)" : "var(--paladin-color)";

  // Toggle switch
  var toggleHtml = '<div class="sheet-toggle">';
  toggleHtml += '<button class="sheet-toggle-btn' + (sheetMode === "bis" ? " active" : "") + '" onclick="setSheetMode(\'bis\')">BiS List</button>';
  toggleHtml += '<button class="sheet-toggle-btn' + (sheetMode === "mygear" ? " active" : "") + '" onclick="setSheetMode(\'mygear\')">My Gear</button>';
  toggleHtml += '</div>';
  if (sheetMode === "mygear") {
    toggleHtml += '<button class="import-icon-btn" onclick="showImportModal()" title="Import from Addon">&#8681; Import</button>';
  }

  // Determine which left/right/weapon slots exist for this spec
  var leftSlots = LEFT_SLOTS.filter(function (s) { return !!bis[s]; });
  var rightSlots = RIGHT_SLOTS.filter(function (s) { return !!bis[s]; });
  var weaponMH = WEAPON_SLOTS_MH.filter(function (s) { return !!bis[s]; });
  var weaponBottom = WEAPON_SLOTS_BOTTOM.filter(function (s) { return !!bis[s]; });

  var renderSlotFn = sheetMode === "mygear" ? renderMyGearSlot : renderGearSlot;

  // Build columns
  var leftHtml = '<div class="slot-column">';
  for (var i = 0; i < leftSlots.length; i++) leftHtml += renderSlotFn(leftSlots[i]);
  leftHtml += '</div>';

  var rightHtml = '<div class="slot-column">';
  for (var i = 0; i < rightSlots.length; i++) rightHtml += renderSlotFn(rightSlots[i]);
  rightHtml += '</div>';

  // Center panel: toggle + stats + weapons in middle
  var bisStats = computeBisStats();
  var centerHtml = '<div class="center-column">';
  centerHtml += toggleHtml;

  if (sheetMode === "mygear") {
    var myStats = getTrackerStats();
    centerHtml += '<div class="stats-row">';
    centerHtml += '<div class="character-model compact">' +
      '<div class="spec-title" style="color:' + classColor + ';margin-bottom:6px;font-size:0.85rem;">' + spec.icon + ' ' + spec.spec + ' ' + spec.class + '</div>' +
      renderStatSummary(myStats) +
      '</div>';
    centerHtml += '<div class="character-model compact">' +
      renderStatComparison(bisStats, myStats) +
      '</div>';
    centerHtml += '</div>';
  } else {
    centerHtml += '<div class="character-model compact">' +
      '<div class="spec-title" style="color:' + classColor + ';margin-bottom:6px;font-size:0.85rem;">' + spec.icon + ' ' + spec.spec + ' ' + spec.class + '</div>' +
      (spec.notes ? '<div class="spec-notes">' + spec.notes + '</div>' : '') +
      renderStatSummary(bisStats) +
      '</div>';
  }

  // Weapons in center column — MH/OH side by side
  if (weaponMH.length) {
    centerHtml += '<div class="weapon-mid">';
    for (var i = 0; i < weaponMH.length; i++) centerHtml += renderSlotFn(weaponMH[i]);
    centerHtml += '</div>';
  }

  // 2H / wand / libram below weapons
  if (weaponBottom.length) {
    centerHtml += '<div class="weapon-bottom">';
    for (var i = 0; i < weaponBottom.length; i++) centerHtml += renderSlotFn(weaponBottom[i]);
    centerHtml += '</div>';
  }

  centerHtml += '</div>';

  document.getElementById("sheetView").innerHTML =
    '<div class="paperdoll-container">' + leftHtml + centerHtml + rightHtml + '</div>';

  refreshWowheadLinks();
}

function parseDungeonGroup(src) {
  var s = src.toLowerCase();

  // Crafted
  var professions = ["tailoring", "blacksmithing", "leatherworking", "jewelcrafting", "engineering", "alchemy"];
  for (var i = 0; i < professions.length; i++) {
    if (s.includes(professions[i])) return professions[i].charAt(0).toUpperCase() + professions[i].slice(1);
  }
  if (s.includes("craft")) return "Crafted";

  // Badges
  if (s.includes("badge") || s.includes("g'eras")) return "Badges of Justice";

  // PvP
  if (s.includes("honor") || s.includes("pvp") || s.includes("arena") || s.includes("gladiator")) return "PvP Rewards";

  // Quest
  if (s.includes("quest")) return "Quest Rewards";

  // Reputation
  if (s.includes("exalted") || s.includes("revered") || s.includes("honored") || s.includes("faction") || s.includes("reputation")) {
    // Try to extract faction name
    // Format is often "Revered - Faction Name" or "Faction (Exalted)"
    var dashIdx = src.indexOf(" - ");
    if (dashIdx !== -1) return src.substring(dashIdx + 3).trim();
    var parenIdx = src.indexOf("(");
    if (parenIdx !== -1) return src.substring(0, parenIdx).trim();
    return src; // return as-is
  }

  // World
  if (s.includes("world drop") || s.includes("boe")) return "World Drops / BoE";

  // Classic
  if (s.includes("classic") || s.includes("naxx") || s.includes("aq") || s.includes("bwl") || s.includes("molten")) return "Classic Raids";

  // Default: use source as dungeon name (clean up a bit)
  // Strip boss names after " - " to group by dungeon
  var dash = src.indexOf(" - ");
  if (dash !== -1) return src.substring(0, dash).trim();
  return src.trim() || "Unknown";
}

function sourceTypeKey(src) {
  var s = src.toLowerCase();
  if (s.includes("heroic")) return "heroic";
  if (s.includes("badge") || s.includes("g'eras")) return "badge";
  if (s.includes("honor") || s.includes("pvp") || s.includes("arena")) return "pvp";
  if (s.includes("tailoring") || s.includes("blacksmithing") || s.includes("leatherworking") ||
      s.includes("jewelcrafting") || s.includes("engineering") || s.includes("alchemy") || s.includes("craft")) return "craft";
  if (s.includes("quest")) return "quest";
  if (s.includes("exalted") || s.includes("revered") || s.includes("honored")) return "rep";
  if (s.includes("world drop") || s.includes("boe")) return "world";
  if (s.includes("classic") || s.includes("naxx") || s.includes("aq") || s.includes("bwl") || s.includes("molten")) return "classic";
  return "dungeon";
}

function sourceEmoji(type) {
  switch(type) {
    case "heroic": return "\u2694\uFE0F";
    case "badge": return "\uD83E\uDE99";
    case "craft": return "\uD83D\uDD28";
    case "rep": return "\uD83D\uDCDC";
    case "classic": return "\uD83D\uDC80";
    case "quest": return "\u2757";
    case "pvp": return "\uD83C\uDFF4";
    case "world": return "\uD83C\uDF0D";
    default: return "\uD83D\uDDE1\uFE0F";
  }
}

// Source category definitions
var SOURCE_CATEGORIES = [
  {key:'dungeon', label:'Dungeons', icon:'\uD83D\uDDE1\uFE0F'},
  {key:'heroic',  label:'Heroic Dungeons', icon:'\u2694\uFE0F'},
  {key:'craft',   label:'Crafting', icon:'\uD83D\uDD28'},
  {key:'rep',     label:'Reputation', icon:'\uD83D\uDCDC'},
  {key:'_other',  label:'Other', icon:'\u2B50'}
];
// Keys that get lumped into "Other"
var OTHER_KEYS = ['badge','classic','quest','world','pvp'];

// Find the first matching item from spec data for a priority text string
function findPrioItemId(prioText, spec) {
  var slotKeys = Object.keys(spec.slots);
  // Exact name match first
  for (var i = 0; i < slotKeys.length; i++) {
    var items = spec.slots[slotKeys[i]];
    for (var j = 0; j < items.length; j++) {
      if (prioText.includes(items[j].name)) return items[j].id;
    }
  }
  // Fuzzy: check if item name's first two words (e.g. "Spellfire Robe") match
  // where the set name appears (e.g. "Spellfire Set")
  var prioLower = prioText.toLowerCase();
  for (var i = 0; i < slotKeys.length; i++) {
    var items = spec.slots[slotKeys[i]];
    for (var j = 0; j < items.length; j++) {
      var words = items[j].name.split(" ");
      if (words.length >= 2 && prioLower.includes(words[0].toLowerCase()) && items[j].q >= 3) {
        return items[j].id;
      }
    }
  }
  return 0;
}
