  <!-- Size toggle — apply saved preference immediately to avoid flash -->
  <script>
  (function() {
    var saved = localStorage.getItem('prebis-ui-size') || 'large';
    document.documentElement.classList.add('size-' + saved);
    document.addEventListener('DOMContentLoaded', function() {
      var toggle = document.getElementById('sizeToggle');
      if (!toggle) return;
      var btns = toggle.querySelectorAll('button');
      btns.forEach(function(btn) {
        if (btn.dataset.size === saved) btn.classList.add('active');
        btn.addEventListener('click', function() {
          var size = btn.dataset.size;
          document.documentElement.classList.remove('size-small', 'size-medium', 'size-large');
          if (size !== 'small') document.documentElement.classList.add('size-' + size);
          localStorage.setItem('prebis-ui-size', size);
          btns.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
        });
      });
    });
  })();
  </script>
